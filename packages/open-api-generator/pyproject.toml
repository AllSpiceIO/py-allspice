[project]
name = "open-api-generator"
description = "Generates py-allspice's Hub API client (schemas + request objects) from the Hub OpenAPI document"
authors = [{ name = "AllSpice, Inc.", email = "maintainers@allspice.io" }]
requires-python = ">=3.10"
version = "0.0.0"
classifiers = ["Private :: Do Not Upload"]  # never published
dependencies = [
    "datamodel-code-generator~=0.68.1",
    "requests~=2.33",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["open_api_generator"]
