name: Publish py-allspice 📦 to PyPI

on:
  push:
    tags:
      - "v*.*"

jobs:
  build-n-publish:
    name: Build and deploy py-allspice 📦 to PyPI
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6
      - name: Check tag matches package version
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          VERSION="$(grep -oP '__version__\s*=\s*"\K[^"]+' packages/allspice/allspice/__init__.py)"
          echo "tag=$TAG  package=$VERSION"
          if [ "$TAG" != "$VERSION" ]; then
            echo "::error::Git tag v$TAG does not match allspice.__version__ ($VERSION)"
            exit 1
          fi
      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
      - name: Build the wheel + sdist
        run: uv build --package py-allspice
      - name: Publish distribution 📦 to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_DEPLOY_TOKEN }}
